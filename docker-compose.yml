services:
  postgres:
    image: postgres:16-alpine
    container_name: tower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tower}
      POSTGRES_DB: ${POSTGRES_DB:-tower}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tower-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tower} -d ${POSTGRES_DB:-tower}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tower-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - tower-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  tower-postgres-data:
  tower-redis-data:
